{% extends "base.html" %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center bg-slate-50 dark:bg-[#0b1120] relative overflow-hidden transition-colors duration-500">
    
    <div class="absolute top-1/4 -left-20 w-80 h-80 bg-blue-600/10 dark:bg-blue-600/20 rounded-full blur-[120px] animate-pulse"></div>
    <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-indigo-600/10 dark:bg-indigo-600/20 rounded-full blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>

    <div class="relative z-10 w-full max-w-md px-4">
        <div class="backdrop-blur-xl bg-white/80 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-700/50 p-10 rounded-[3rem] shadow-2xl">
            
            <div class="text-center mb-10">
                <div class="relative inline-block">
                    <div class="absolute inset-0 bg-blue-500 blur-lg opacity-20 dark:opacity-50 rounded-full"></div>
                    <div class="relative bg-blue-600 dark:bg-gradient-to-tr dark:from-blue-600 dark:to-indigo-400 p-4 rounded-2xl shadow-lg">
                        <i class="fa-solid fa-fingerprint text-3xl text-white"></i>
                    </div>
                </div>
                <h2 class="mt-6 text-2xl font-black uppercase italic tracking-tighter text-slate-800 dark:text-white">
                    Auth <span class="text-blue-600 dark:text-blue-400">Terminal</span>
                </h2>
                <p class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-[0.4em] mt-2">Acceso Restringido</p>
            </div>

            <form method="POST" class="space-y-6">
                <div class="group">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-blue-600 dark:text-blue-400 mb-2 ml-1">System ID</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-4 text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <i class="fa-solid fa-terminal"></i>
                        </span>
                        <input type="text" name="username" required placeholder="ADMIN_USER"
                            class="w-full pl-12 pr-4 py-4 bg-slate-100 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-slate-800 dark:text-white font-mono text-sm placeholder:text-slate-400">
                    </div>
                </div>
                
                <div class="group">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-blue-600 dark:text-blue-400 mb-2 ml-1">Access Key</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-4 text-slate-400 group-focus-within:text-blue-600 transition-colors">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" name="password" required placeholder="••••••••"
                            class="w-full pl-12 pr-4 py-4 bg-slate-100 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-slate-800 dark:text-white font-mono text-sm placeholder:text-slate-400">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                    Ejecutar Login <i class="fa-solid fa-chevron-right text-[10px]"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
