{% extends "base.html" %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center bg-slate-50 dark:bg-[#0b1120] relative overflow-hidden transition-colors duration-500">

    <div class="absolute top-1/4 -left-20 w-80 h-80 bg-purple-600/10 dark:bg-purple-600/20 rounded-full blur-[120px] animate-pulse"></div>
    <div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-blue-600/10 dark:bg-blue-600/20 rounded-full blur-[120px] animate-pulse" style="animation-delay:2s"></div>

    <div class="relative z-10 w-full max-w-md px-4">
        <div class="backdrop-blur-xl bg-white/80 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-700/50 p-10 rounded-[3rem] shadow-2xl">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="relative inline-block">
                    <div class="absolute inset-0 bg-purple-500 blur-lg opacity-20 dark:opacity-40 rounded-full"></div>
                    <div class="relative bg-purple-600 p-4 rounded-2xl shadow-lg">
                        <i class="fa-solid fa-user-shield text-3xl text-white"></i>
                    </div>
                </div>
                <h2 class="mt-6 text-2xl font-black uppercase italic tracking-tighter text-slate-800 dark:text-white">
                    Mi <span class="text-purple-600 dark:text-purple-400">Perfil</span>
                </h2>
                <p class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-[0.4em] mt-2">
                    {{ current_user }}
                </p>
            </div>

            <!-- Mensajes -->
            {% if mensaje_ok %}
            <div class="mb-6 flex items-center gap-3 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-700 dark:text-green-400 p-4 rounded-2xl text-xs font-bold">
                <i class="fa-solid fa-circle-check text-base shrink-0"></i>
                {{ mensaje_ok }}
            </div>
            {% endif %}

            {% if mensaje_err %}
            <div class="mb-6 flex items-center gap-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 p-4 rounded-2xl text-xs font-bold">
                <i class="fa-solid fa-circle-exclamation text-base shrink-0"></i>
                {{ mensaje_err }}
            </div>
            {% endif %}

            <!-- Formulario cambio de clave -->
            <div class="mb-2">
                <p class="text-[10px] font-black uppercase tracking-widest text-purple-600 dark:text-purple-400 mb-5 flex items-center gap-2">
                    <i class="fa-solid fa-key"></i> Cambiar Contraseña
                </p>
            </div>

            <form method="POST" class="space-y-5">
                <div class="group">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Contraseña Actual</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-4 text-slate-400 group-focus-within:text-purple-600 transition-colors">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" name="clave_actual" required placeholder="••••••••"
                            class="w-full pl-12 pr-4 py-4 bg-slate-100 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-purple-500 outline-none transition-all text-slate-800 dark:text-white font-mono text-sm placeholder:text-slate-400">
                    </div>
                </div>

                <div class="group">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Nueva Contraseña</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-4 text-slate-400 group-focus-within:text-purple-600 transition-colors">
                            <i class="fa-solid fa-lock-open"></i>
                        </span>
                        <input type="password" name="clave_nueva" id="inp-nueva" required placeholder="Mínimo 6 caracteres"
                            class="w-full pl-12 pr-4 py-4 bg-slate-100 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-purple-500 outline-none transition-all text-slate-800 dark:text-white font-mono text-sm placeholder:text-slate-400"
                            oninput="checkMatch()">
                    </div>
                </div>

                <div class="group">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Confirmar Nueva Contraseña</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-4 text-slate-400 group-focus-within:text-purple-600 transition-colors">
                            <i class="fa-solid fa-shield-check"></i>
                        </span>
                        <input type="password" name="clave_confirmacion" id="inp-conf" required placeholder="Repite la nueva contraseña"
                            class="w-full pl-12 pr-4 py-4 bg-slate-100 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-purple-500 outline-none transition-all text-slate-800 dark:text-white font-mono text-sm placeholder:text-slate-400"
                            oninput="checkMatch()">
                    </div>
                    <p id="match-msg" class="text-[10px] font-bold mt-1.5 ml-1 hidden"></p>
                </div>

                <!-- Indicador fuerza -->
                <div id="strength-bar-wrap" class="hidden">
                    <p class="text-[9px] font-black uppercase text-slate-400 mb-1 ml-1">Fuerza de la contraseña</p>
                    <div class="h-1.5 w-full bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                        <div id="strength-bar" class="h-full rounded-full transition-all duration-300" style="width:0%"></div>
                    </div>
                    <p id="strength-label" class="text-[9px] font-black uppercase mt-1 ml-1"></p>
                </div>

                <button type="submit" id="btn-submit"
                    class="w-full py-4 bg-purple-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-lg hover:bg-purple-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> Actualizar Contraseña
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-slate-200 dark:border-slate-700 flex justify-between items-center">
                <a href="/" class="text-xs text-slate-500 hover:text-blue-600 font-bold transition-colors">
                    <i class="fa-solid fa-house mr-1"></i> Inicio
                </a>
                <a href="/logout" class="text-xs text-red-500 hover:text-red-600 font-bold transition-colors">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </div>
</div>

<script>
function checkMatch() {
    const nueva = document.getElementById('inp-nueva').value;
    const conf  = document.getElementById('inp-conf').value;
    const msg   = document.getElementById('match-msg');

    // Fuerza
    const wrap = document.getElementById('strength-bar-wrap');
    const bar  = document.getElementById('strength-bar');
    const lbl  = document.getElementById('strength-label');
    if (nueva.length > 0) {
        wrap.classList.remove('hidden');
        let score = 0;
        if (nueva.length >= 6)  score++;
        if (nueva.length >= 10) score++;
        if (/[A-Z]/.test(nueva)) score++;
        if (/[0-9]/.test(nueva)) score++;
        if (/[^A-Za-z0-9]/.test(nueva)) score++;
        const levels = [
            { w: '20%', color: 'bg-red-500',    text: 'Muy débil',  tc: 'text-red-500' },
            { w: '40%', color: 'bg-orange-500',  text: 'Débil',      tc: 'text-orange-500' },
            { w: '60%', color: 'bg-yellow-500',  text: 'Regular',    tc: 'text-yellow-500' },
            { w: '80%', color: 'bg-blue-500',    text: 'Buena',      tc: 'text-blue-500' },
            { w: '100%',color: 'bg-green-500',   text: 'Muy fuerte', tc: 'text-green-600' },
        ];
        const lvl = levels[Math.min(score, 4)];
        bar.style.width = lvl.w;
        bar.className = `h-full rounded-full transition-all duration-300 ${lvl.color}`;
        lbl.textContent = lvl.text;
        lbl.className = `text-[9px] font-black uppercase mt-1 ml-1 ${lvl.tc}`;
    } else {
        wrap.classList.add('hidden');
    }

    // Coincidencia
    if (conf.length === 0) { msg.classList.add('hidden'); return; }
    msg.classList.remove('hidden');
    if (nueva === conf) {
        msg.textContent = '✓ Las contraseñas coinciden';
        msg.className = 'text-[10px] font-bold mt-1.5 ml-1 text-green-600';
    } else {
        msg.textContent = '✗ Las contraseñas no coinciden';
        msg.className = 'text-[10px] font-bold mt-1.5 ml-1 text-red-500';
    }
}
</script>
{% endblock %}
