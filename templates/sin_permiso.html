{% extends "base.html" %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center p-4">
    <div class="text-center max-w-md">
        <div class="w-24 h-24 bg-red-100 dark:bg-red-900/30 rounded-[2rem] flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-lock text-4xl text-red-500"></i>
        </div>
        <h1 class="text-4xl font-black uppercase italic tracking-tighter text-slate-800 dark:text-white mb-3">Acceso Denegado</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm mb-8">
            No tienes permisos para acceder a esta sección. Contacta al administrador para solicitar acceso.
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="px-6 py-3 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 transition-all">
                <i class="fa-solid fa-house mr-2"></i>Volver al Inicio
            </a>
            <a href="/login" class="px-6 py-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                <i class="fa-solid fa-right-to-bracket mr-2"></i>Cambiar Cuenta
            </a>
        </div>
    </div>
</div>
{% endblock %}
